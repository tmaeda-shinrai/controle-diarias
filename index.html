<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard de controle de diárias - DETRAN/MS">
    <title>Diárias — Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📊</text></svg>">
</head>

<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader-spinner"></div>
        <span class="loader-text">Carregando dados...</span>
    </div>

    <!-- Error Toast -->
    <div id="error-toast"></div>

    <!-- Main App -->
    <div class="app-container">

        <!-- Header -->
        <header class="app-header">
            <div class="header-top">
                <div class="app-title">
                    <h1>Diárias — Dashboard</h1>
                    <span class="subtitle">Controle de Solicitações</span>
                </div>
                <div class="header-actions">
                    <span id="last-sync"></span>
                    <button id="refresh-btn" title="Atualizar dados">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Tabs Navigation -->
            <div class="app-tabs">
                <button class="tab-btn active" data-target="view-dashboard">Dashboard (Pedidos)</button>
                <button class="tab-btn" data-target="view-relatorios">Relatórios de Pagamento</button>
            </div>
        </header>

        <!-- VIEW: DASHBOARD (Fase 1) -->
        <div id="view-dashboard" class="app-view active">
            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat-chip">
                    <span class="stat-value" id="total-solicitacoes">—</span>
                    <span class="stat-label">Total de Solicitações</span>
                </div>
                <div class="stat-chip alert">
                    <span class="stat-value" id="total-pendentes">—</span>
                    <span class="stat-label">Pendências</span>
                </div>
            </div>

            <!-- Search -->
            <div class="search-section">
                <div class="search-wrapper">
                    <span class="search-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </span>
                    <input type="text" id="search-input" placeholder="Buscar por nome ou matrícula..."
                        autocomplete="off">
                </div>
                <button id="clear-filter-btn">Limpar filtro</button>
            </div>

            <!-- Servidor Info (hidden by default) -->
            <div id="servidor-info"></div>

            <!-- Status Cards -->
            <section id="status-cards"></section>

            <!-- Expanded Table -->
            <section id="expanded-table-section">
                <div class="table-header"></div>
                <div class="table-scroll">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th class="col-pedido">Pedido</th>
                                <th class="col-servidor">Servidor</th>
                                <th class="col-trecho">Trecho</th>
                                <th class="col-inicio">Início</th>
                                <th class="col-final">Final</th>
                                <th class="col-valor">Valor</th>
                                <th class="col-quant">Quant.</th>
                                <th class="col-situacao">Situação</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </div>

        <!-- VIEW: RELATÓRIOS (Fase 2) -->
        <div id="view-relatorios" class="app-view">
            <div class="search-section view-header-search">
                <div class="search-wrapper">
                    <span class="search-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </span>
                    <input type="text" id="search-relatorio-input"
                        placeholder="Digite o número do relatório (ex: 1, 2) e aguarde..." autocomplete="off">
                </div>
            </div>

            <div id="relatorio-resultados">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round"
                        style="margin-bottom:16px; opacity:0.5; color:var(--accent-primary)">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                        <line x1="8" y1="14" x2="16" y2="14"></line>
                        <line x1="12" y1="18" x2="12" y2="18"></line>
                    </svg>
                    <p>Digite o número do Relatório de Pagamento abaixo da barra de pesquisa para visualizar a prestação
                        de contas daquele lote.</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts (order matters) -->
    <script src="js/api.js"></script>
    <script src="js/statusEngine.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/relatorios.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
